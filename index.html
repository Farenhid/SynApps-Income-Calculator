      const dimensions = ["فنی", "استقلال", "تاثیر", "فرآیند"];

      function toEnglishDigits(value) {
        const persianDigits = "۰۱۲۳۴۵۶۷۸۹";
        const arabicDigits = "٠١٢٣٤٥٦٧٨٩";

        return value
          .replace(/[۰-۹]/g, (digit) => persianDigits.indexOf(digit))
          .replace(/[٠-٩]/g, (digit) => arabicDigits.indexOf(digit))
          .replace(/,/g, "");
      }

      function parseInput(value) {
        const normalizedValue = toEnglishDigits(String(value).trim());
        return normalizedValue === "" ? NaN : Number(normalizedValue);
      }

      function formatToman(value) {
        return new Intl.NumberFormat("en-US", {
          maximumFractionDigits: 0,
        }).format(Math.round(value));
      }

      function formatNumber(value) {
        return new Intl.NumberFormat("en-US", {
          maximumFractionDigits: 1,
        }).format(value);
      }

      function BaseRateCalculator() {
        const [values, setValues] = useState(initialValues);
        const [calculatedRate, setCalculatedRate] = useState(null);
        const [message, setMessage] = useState("");

        const preview = useMemo(() => calculateBaseRate(values), [values]);

        function calculateBaseRate(currentValues) {
          const wMin = parseInput(currentValues.wMin);
          const wTarget = parseInput(currentValues.wTarget);
          const rActual = parseInput(currentValues.rActual);
          const rTarget = parseInput(currentValues.rTarget);

          if ([wMin, wTarget, rActual, rTarget].some((item) => !Number.isFinite(item))) {
            return {
              value: null,
              error: "لطفاً همه فیلدها را با عدد معتبر تکمیل کنید.",
              ratio: 0,
            };
          }

          if (rTarget <= 0) {
            return {
              value: null,
              error: "تاب‌آوری هدف باید بزرگ‌تر از صفر باشد تا محاسبه امکان‌پذیر شود.",
              ratio: 0,
            };
          }

          const runwayRatio = Math.min(1, Math.max(0, rActual / rTarget));
          const baseRate = wMin + (wTarget - wMin) * runwayRatio;

          return {
            value: baseRate,
            error: "",
            ratio: runwayRatio,
          };
        }

        function handleChange(key, value) {
          setValues((currentValues) => ({
            ...currentValues,
            [key]: value,
          }));
          setCalculatedRate(null);
          setMessage("");
        }

        function handleSubmit(event) {
          event.preventDefault();
          const result = calculateBaseRate(values);
          setCalculatedRate(result.value);
          setMessage(result.error);
        }

        const visibleRate = calculatedRate ?? preview.value;
        const visibleError = message || preview.error;
        const progressPercent = Math.round((preview.ratio || 0) * 100);

        return (
          <>
            <header className="overflow-hidden rounded-[2rem] border border-slate-200 bg-white shadow-xl shadow-slate-200/70">
              <div className="grid gap-8 p-6 sm:p-8 lg:grid-cols-[1.1fr_0.9fr] lg:p-10">

                  <div className="mt-4 rounded-2xl bg-white/10 p-5 ring-1 ring-white/15">
                    <p className="text-sm text-blue-100">حقوق پایه ساعتی</p>
                    <p className="mt-3 text-2xl font-extrabold tracking-tight sm:text-3xl">
                      {visibleRate !== null ? `${formatToman(visibleRate)} تومان` : "—"}
                    </p>
                  </div>
                  <div className="mt-6">
                    <div className="mb-2 flex items-center justify-between text-sm text-blue-100">
                      <span>ضریب تحقق تاب‌آوری</span>
                      <span>{progressPercent}٪</span>

                        style={{ width: `${progressPercent}%` }}

                </div>

                  </div>
                  <div className="mt-4 rounded-2xl bg-slate-900 p-4 text-left font-mono text-sm leading-7 text-blue-100" dir="ltr">
                    Base_Rate = W_min + ((W_target - W_min) * MIN(1, R_actual / R_target))
                  </div>
                  <p className="mt-4 text-sm leading-7 text-slate-500">
                    هرچه تاب‌آوری فعلی به هدف امن نزدیک‌تر شود، نرخ پایه از کف بقا به
                    حقوق ایده‌آل بازار نزدیک‌تر می‌شود.
                  </p>
                </div>

                <div className="rounded-[2rem] border border-blue-100 bg-blue-50 p-6">
                  <h2 className="text-base font-bold text-blue-950">خروجی قابل پرداخت</h2>
                  <p className="mt-4 text-sm leading-7 text-blue-800">
                    این عدد نرخ پایه ساعتی پیشنهادی برای سال جاری است و می‌تواند مبنای
                    تصمیم‌گیری مالی تیم در شرایط فعلی شرکت باشد.
                  </p>
                  <div className="mt-5 rounded-2xl bg-white p-5 text-center shadow-sm">
                    <p className="text-sm font-medium text-slate-500">مبلغ نهایی</p>
                    <p className="mt-2 text-xl font-extrabold text-blue-800">
                      {visibleRate !== null ? `${formatToman(visibleRate)} تومان` : "نامشخص"}
                    </p>
                  </div>
                </div>
              </aside>
            </div>
          </>
        );
      }

      function CompensationCalculator() {
        const roleIds = Object.keys(rolesData);
        const [selectedRoleId, setSelectedRoleId] = useState(roleIds[0]);
        const [scores, setScores] = useState({});
        const [employeeValues, setEmployeeValues] = useState({
          employeeName: "",
          baseHourlyRate: initialValues.wMin,
          workedHours: "160",
        });

        const selectedRole = rolesData[selectedRoleId];
        const totalScore = Object.values(scores).reduce((sum, value) => sum + value, 0);
        const answeredCount = Object.keys(scores).length;
        const multiplier = totalScore > 0 ? 0.7 + totalScore * 0.01 : 1;
        const baseHourlyRate = parseInput(employeeValues.baseHourlyRate);
        const workedHours = parseInput(employeeValues.workedHours);
        const hasValidPaymentInputs =
          Number.isFinite(baseHourlyRate) &&
          Number.isFinite(workedHours) &&
          baseHourlyRate >= 0 &&
          workedHours >= 0;
        const monthlyPay = hasValidPaymentInputs ? baseHourlyRate * multiplier * workedHours : null;
        const paymentError = hasValidPaymentInputs
          ? ""
          : "برای محاسبه پرداخت، عدد پایه ساعتی و ساعات کار را با عدد معتبر وارد کنید.";

        const dimensionStats = useMemo(() => {
          return dimensions.map((dimension) => {
            const factors = selectedRole.factors.filter((factor) => factor.dim === dimension);
            const selectedValues = factors
              .map((factor) => scores[factor.id])
              .filter((value) => Number.isFinite(value));
            const sum = selectedValues.reduce((current, value) => current + value, 0);
            const average = selectedValues.length ? sum / selectedValues.length : 0;

            return {
              dimension,
              average,
              answered: selectedValues.length,
              total: factors.length,
            };
          });
        }, [scores, selectedRole]);

        function handleEmployeeChange(key, value) {
          setEmployeeValues((currentValues) => ({
            ...currentValues,
            [key]: value,
          }));
        }

        function handleRoleChange(roleId) {
          setSelectedRoleId(roleId);
          setScores({});
        }

        function handleScoreChange(factorId, value) {
          setScores((currentScores) => ({
            ...currentScores,
            [factorId]: value,
          }));
        }

        function getScoreClass(value, selectedValue) {
          if (selectedValue !== value) {
            return "border-slate-200 bg-white text-slate-600 hover:-translate-y-0.5 hover:border-blue-200 hover:shadow-md";
          }

          if (value === 1) {
            return "border-rose-300 bg-rose-50 text-rose-900 shadow-md shadow-rose-100";
          }

          if (value === 3) {
            return "border-amber-300 bg-amber-50 text-amber-900 shadow-md shadow-amber-100";
          }

          return "border-emerald-300 bg-emerald-50 text-emerald-900 shadow-md shadow-emerald-100";
        }

        return (
          <>
            <header className="overflow-hidden rounded-[2rem] border border-slate-200 bg-white shadow-xl shadow-slate-200/70">
              <div className="grid gap-8 p-6 sm:p-8 lg:grid-cols-[1.1fr_0.9fr] lg:p-10">
                <div className="flex flex-col justify-center">
                  <span className="mb-4 w-fit rounded-full bg-blue-50 px-4 py-2 text-sm font-semibold text-blue-700">
                    ماتریس ضریب فردی
                  </span>
                  <h1 className="text-xl font-extrabold leading-tight text-slate-950 sm:text-2xl lg:text-3xl">
                    محاسبه پرداخت ماهانه بر اساس عدد پایه، ضریب و ساعات کار
                  </h1>
                  <p className="mt-4 max-w-2xl text-sm leading-7 text-slate-600">
                    برای هر نیرو نقش را انتخاب کنید، معیارهای رفتاری را امتیاز دهید و
                    مبلغ قابل پرداخت ماهانه را از ضرب عدد پایه در ضریب فردی و ساعات کار ببینید.
                  </p>
                </div>

                <div className="rounded-3xl bg-gradient-to-br from-blue-700 to-slate-900 p-6 text-white shadow-2xl shadow-blue-900/20">
                  <p className="text-sm font-medium text-blue-100">
                    {employeeValues.employeeName.trim() || "نیروی انتخاب‌شده"}
                  </p>
                  <div className="mt-4 rounded-2xl bg-white/10 p-5 ring-1 ring-white/15">
                    <p className="text-sm text-blue-100">پرداخت ماهانه پیشنهادی</p>
                    <p className="mt-3 text-2xl font-extrabold tracking-tight sm:text-3xl">
                      {monthlyPay !== null ? `${formatToman(monthlyPay)} تومان` : "—"}
                    </p>
                  </div>
                  <div className="mt-5 grid grid-cols-3 gap-3 text-center">
                    <div className="rounded-2xl bg-white/10 p-3 ring-1 ring-white/10">
                      <p className="text-xs text-blue-100">پایه ساعتی</p>
                      <p className="mt-2 text-sm font-extrabold">
                        {Number.isFinite(baseHourlyRate) ? formatToman(baseHourlyRate) : "—"}
                      </p>
                    </div>
                    <div className="rounded-2xl bg-white/10 p-3 ring-1 ring-white/10">
                      <p className="text-xs text-blue-100">ضریب</p>
                      <p className="mt-2 text-sm font-extrabold">{multiplier.toFixed(2)}x</p>
                    </div>
                    <div className="rounded-2xl bg-white/10 p-3 ring-1 ring-white/10">
                      <p className="text-xs text-blue-100">ساعت</p>
                      <p className="mt-2 text-sm font-extrabold">
                        {Number.isFinite(workedHours) ? formatNumber(workedHours) : "—"}
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </header>

            <div className="grid gap-8 lg:grid-cols-[1fr_380px]">
              <section className="flex flex-col gap-6">
                <div className="rounded-[2rem] border border-slate-200 bg-white p-5 shadow-lg shadow-slate-200/60 sm:p-7">
                  <div className="mb-6 flex flex-col gap-2 border-b border-slate-100 pb-5">
                    <h2 className="text-lg font-bold text-slate-950">مشخصات محاسبه</h2>
                    <p className="leading-7 text-slate-500">
                      عدد پایه می‌تواند همان خروجی تب حقوق پایه باشد. ضریب فردی از امتیازهای نقش انتخاب‌شده محاسبه می‌شود.
                    </p>
                  </div>

                  <div className="grid gap-4 sm:grid-cols-3">
                    <Field
                      field={{
                        key: "employeeName",
                        label: "نام نیرو",
                        description: "برای خوانایی خروجی پرداخت ماهانه.",
                        placeholder: "مثلاً علی رضایی",
                        inputMode: "text",
                      }}
                      value={employeeValues.employeeName}
                      onChange={handleEmployeeChange}
                    />
                    <Field
                      field={{
                        key: "baseHourlyRate",
                        label: "عدد پایه ساعتی",
                        description: "نرخ پایه ثابت برای این فرد، به تومان.",
                        placeholder: "مثلاً ۸۰,۰۰۰",
                      }}
                      value={employeeValues.baseHourlyRate}
                      onChange={handleEmployeeChange}
                    />
                    <Field
                      field={{
                        key: "workedHours",
                        label: "ساعات کار ماهانه",
                        description: "مجموع ساعت کار ثبت‌شده در ماه.",
                        placeholder: "مثلاً ۱۶۰",
                      }}
                      value={employeeValues.workedHours}
                      onChange={handleEmployeeChange}
                    />
                  </div>

                  {paymentError && (
                    <div className="mt-5 rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm font-medium leading-6 text-amber-800">
                      {paymentError}
                    </div>
                  )}
                </div>

                <div className="rounded-[2rem] border border-slate-200 bg-white p-5 shadow-lg shadow-slate-200/60 sm:p-7">
                  <div className="mb-5 flex flex-col gap-2 border-b border-slate-100 pb-5">
                    <h2 className="text-lg font-bold text-slate-950">انتخاب نقش ارزیابی</h2>
                    <p className="leading-7 text-slate-500">
                      با تغییر نقش، امتیازهای قبلی پاک می‌شود تا ضریب برای ماتریس جدید از ابتدا مشخص شود.
                    </p>
                  </div>

                  <div className="grid gap-3 sm:grid-cols-2">
                    {Object.values(rolesData).map((role) => {
                      const isSelected = role.id === selectedRoleId;

                      return (
                        <button
                          key={role.id}
                          type="button"
                          onClick={() => handleRoleChange(role.id)}
                          className={`rounded-2xl border p-4 text-right transition ${
                            isSelected
                              ? "border-blue-600 bg-blue-50 shadow-lg shadow-blue-100"
                              : "border-slate-200 bg-slate-50/80 hover:border-blue-200 hover:bg-white"
                          }`}
                        >
                          <span className="block text-sm font-extrabold text-slate-950">
                            {role.title}
                          </span>
                          <span className="mt-1 block text-sm text-slate-500">{role.farsi}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>

                <div className="flex flex-col gap-4">
                  {selectedRole.factors.map((factor, index) => (
                    <article
                      key={factor.id}
                      className="overflow-hidden rounded-[1.75rem] border border-slate-200 bg-white shadow-lg shadow-slate-200/50"
                    >
                      <div className="flex flex-col gap-3 border-b border-slate-100 bg-slate-50/70 p-5 sm:flex-row sm:items-center sm:justify-between">
                        <div className="flex items-center gap-3">
                          <span className="flex h-8 w-8 items-center justify-center rounded-full bg-slate-200 text-sm font-extrabold text-slate-700">
                            {index + 1}
                          </span>
                          <div>
                            <h3 className="text-sm font-extrabold text-slate-950">{factor.name}</h3>
                            <p className="mt-1 text-sm text-slate-500">{factor.dimFull}</p>
                          </div>
                        </div>
                        <span className="w-fit rounded-full bg-blue-50 px-3 py-1 text-xs font-bold text-blue-700">
                          {factor.dim}
                        </span>
                      </div>

                      <div className="grid gap-3 p-5 md:grid-cols-3">
                        {[1, 3, 5].map((value) => (
                          <label
                            key={value}
                            className={`flex h-full cursor-pointer flex-col rounded-2xl border-2 p-4 transition ${getScoreClass(
                              value,
                              scores[factor.id]
                            )}`}
                          >
                            <input
                              type="radio"
                              name={factor.id}
                              value={value}
                              checked={scores[factor.id] === value}
                              onChange={() => handleScoreChange(factor.id, value)}
                              className="sr-only"
                            />
                            <span className="mb-3 text-sm font-black text-slate-500">
                              امتیاز {value}
                            </span>
                            <span className="text-sm font-medium leading-7">{factor.anchors[value]}</span>
                          </label>
                        ))}
                      </div>
                    </article>
                  ))}
                </div>
              </section>

              <aside className="flex flex-col gap-5">
                <div className="sticky top-6 flex flex-col gap-5">
                  <div className="rounded-[2rem] border border-slate-200 bg-white p-6 shadow-lg shadow-slate-200/60">
                    <div className="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
                      <div>
                        <h2 className="text-base font-bold text-slate-950">خلاصه ضریب فردی</h2>
                        <p className="mt-2 text-sm leading-6 text-slate-500">
                          منطق امتیازدهی و ضریب از داکیومنت Dynamic Base-Rate Multiplier آمده است.
                        </p>
                      </div>
                      <SourceDocButton href={sourceDocs.multiplier} />
                    </div>
                    <div className="mt-5 grid grid-cols-2 gap-3">
                      <div className="rounded-2xl bg-slate-50 p-4 text-center">
                        <p className="text-sm text-slate-500">امتیاز کل</p>
                        <p className="mt-2 text-xl font-extrabold text-slate-950">
                          {totalScore} <span className="text-base text-slate-400">/ 50</span>
                        </p>
                      </div>
                      <div className="rounded-2xl bg-blue-50 p-4 text-center">
                        <p className="text-sm text-blue-700">ضریب محاسبه‌شده</p>
                        <p className="mt-2 text-xl font-extrabold text-blue-800">
                          {multiplier.toFixed(2)}x
                        </p>
                      </div>
                    </div>
                    <div className="mt-5 rounded-2xl bg-slate-900 p-4 text-left font-mono text-sm leading-7 text-blue-100" dir="ltr">
                      Pay = Base_Rate * Multiplier * Hours
                    </div>
                    <p className="mt-4 text-sm leading-7 text-slate-500">
                      {answeredCount} معیار از {selectedRole.factors.length} معیار این نقش امتیازدهی شده است.
                    </p>
                  </div>

                  <div className="rounded-[2rem] border border-blue-100 bg-blue-50 p-6">
                    <h2 className="text-base font-bold text-blue-950">پرداخت نهایی این ماه</h2>
                    <div className="mt-5 rounded-2xl bg-white p-5 text-center shadow-sm">
                      <p className="text-sm font-medium text-slate-500">
                        {employeeValues.employeeName.trim() || "مبلغ قابل پرداخت"}
                      </p>
                      <p className="mt-2 text-xl font-extrabold text-blue-800">
                        {monthlyPay !== null ? `${formatToman(monthlyPay)} تومان` : "نامشخص"}
                      </p>
                    </div>
                    <p className="mt-4 text-sm leading-7 text-blue-800">
                      این مبلغ از ضرب عدد پایه ساعتی در ضریب فردی و تعداد ساعات کار ماهانه به دست می‌آید.
                    </p>
                  </div>

                  <div className="rounded-[2rem] border border-slate-200 bg-white p-6 shadow-lg shadow-slate-200/60">
                    <h2 className="text-base font-bold text-slate-950">تعادل ابعاد ارزیابی</h2>
                    <div className="mt-5 flex flex-col gap-4">
                      {dimensionStats.map((stat) => (
                        <div key={stat.dimension}>
                          <div className="mb-2 flex items-center justify-between text-sm">
                            <span className="font-bold text-slate-700">{stat.dimension}</span>
                            <span className="text-slate-500">
                              {formatNumber(stat.average)} / 5
                            </span>
                          </div>
                          <div className="h-3 overflow-hidden rounded-full bg-slate-100">
                            <div
                              className="h-full rounded-full bg-blue-600 transition-all duration-500"
                              style={{ width: `${(stat.average / 5) * 100}%` }}
                            ></div>
                          </div>
                          <p className="mt-1 text-xs text-slate-400">
                            {stat.answered} از {stat.total} معیار
                          </p>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </aside>
            </div>
          </>
        );
      }

      function App() {
        const [activeTab, setActiveTab] = useState("base");

        const tabs = [
          {
            id: "base",
            label: "حقوق پایه ساعتی",
            description: "محاسبه عدد ثابت پایه",
          },
          {
            id: "compensation",
            label: "ضریب و پرداخت ماهانه",
            description: "محاسبه ضریب فردی و مبلغ نهایی",
          },
        ];

        return (
          <main className="min-h-screen px-4 py-8 sm:px-6 lg:px-8">
            <section className="mx-auto flex max-w-6xl flex-col gap-8">
              <nav className="rounded-[2rem] border border-slate-200 bg-white p-2 shadow-lg shadow-slate-200/60">
                <div className="grid gap-2 sm:grid-cols-2">
                  {tabs.map((tab) => {
                    const isActive = tab.id === activeTab;

                    return (
                      <button
                        key={tab.id}
                        type="button"
                        onClick={() => setActiveTab(tab.id)}
                        className={`rounded-[1.5rem] px-5 py-4 text-right transition ${
                          isActive
                            ? "bg-blue-700 text-white shadow-lg shadow-blue-700/20"
                            : "bg-slate-50 text-slate-600 hover:bg-blue-50 hover:text-blue-800"
                        }`}
                      >
                        <span className="block text-sm font-extrabold">{tab.label}</span>
                        <span
                          className={`mt-1 block text-sm ${
                            isActive ? "text-blue-100" : "text-slate-400"
                          }`}
                        >
                          {tab.description}
                        </span>
                      </button>
                    );
                  })}
                </div>
              </nav>

              <div className="flex flex-col gap-8">
                {activeTab === "base" ? <BaseRateCalculator /> : <CompensationCalculator />}
              </div>
            </section>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
